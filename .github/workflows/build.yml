name: Build Android AAB
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone TWA template
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa

      - name: Configure TWA
        working-directory: twa
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">복리계산기</string>
            <string name="launcher_name">복리계산기</string>
            <string name="asset_statements">[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"web","site":"https://leeseonkeunsam.github.io"}}]</string>
          </resources>
          EOF
          
          sed -i 's|https://svgomg.net|https://leeseonkeunsam.github.io|g' app/build.gradle
          sed -i 's|/|/compound-calculator/|g' app/build.gradle
          sed -i 's|net.svgomg.twa|com.skstudio.compoundcalculator|g' app/build.gradle

      - name: Generate Keystore
        working-directory: twa
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=SK Studio, O=SK Studio, C=KR"

      - name: Build AAB
        working-directory: twa
        run: |
