name: Build Android AAB
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Create Android project
        run: |
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/gradle/wrapper

          cat > twa/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          echo "include ':app'" > twa/settings.gradle

          cat > twa/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > twa/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              compileSdk 34
              namespace 'com.skstudio.compoundcalculator'
              defaultConfig {
                  applicationId 'com.skstudio.compoundcalculator'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              signingConfigs {
                  release {
                      storeFile file('../android.keystore')
                      storePassword 'android123'
                      keyAlias 'android'
                      keyPassword 'android123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:label="@string/app_name"
                android:allowBackup="true"
                android:supportsRtl="true">
              <activity
                  android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                  android:exported="true">
                <meta-data
                    android:name="android.support.customtabs.trusted.DEFAULT_URL"
                    android:value="https://leeseonkeunsam.github.io/compound-calculator/" />
                <meta-data
                    android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                    android:resource="@color/colorPrimary" />
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT" />
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https"
                      android:host="leeseonkeunsam.github.io"
                      android:pathPrefix="/compound-calculator"/>
                </intent-filter>
              </activity>
              <service
                  android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                  android:exported="true"
                  android:enabled="true">
                <intent-filter>
                  <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                </intent-filter>
              </service>
            </application>
          </manifest>
          EOF

          cat > twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">복리계산기</string>
          </resources>
          EOF

          cat > twa/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0e0f11</color>
          </resources>
          EOF

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore twa/android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=SK Studio, O=SK Studio, C=KR"

      - name: Build AAB
        working-directory: twa
        run: gradle bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: twa/app/build/outputs/bundle/release/app-release.aab
